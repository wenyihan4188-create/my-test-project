<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Liquid Glass Template</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #102027;
        --muted: #60757d;
        --line: rgba(255, 255, 255, 0.54);
        --glass: rgba(255, 255, 255, 0.48);
        --glass-strong: rgba(255, 255, 255, 0.68);
        --accent: #0f766e;
        --accent-2: #2f6df6;
        --fail: #b3261e;
        --shadow: 0 28px 80px rgba(28, 54, 68, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at 12% 18%, rgba(48, 155, 219, 0.32), transparent 28%),
          radial-gradient(circle at 82% 10%, rgba(15, 118, 110, 0.26), transparent 26%),
          radial-gradient(circle at 72% 82%, rgba(240, 179, 90, 0.28), transparent 30%),
          linear-gradient(135deg, #edf7f8 0%, #f7fbfb 42%, #e6eff2 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent 78%);
      }

      .app {
        position: relative;
        z-index: 1;
        height: 100%;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 20px;
        padding: 20px;
      }

      .glass {
        border: 1px solid var(--line);
        background: var(--glass);
        box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(22px) saturate(1.35);
        -webkit-backdrop-filter: blur(22px) saturate(1.35);
      }

      .sidebar {
        min-height: 0;
        padding: 18px;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: rgba(16, 32, 39, 0.88);
        color: #fff;
        font-weight: 900;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      .brand strong,
      .brand span {
        display: block;
      }

      .brand span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .nav {
        display: grid;
        gap: 8px;
      }

      .nav button {
        height: 44px;
        padding: 0 12px;
        border: 1px solid transparent;
        border-radius: 12px;
        background: transparent;
        color: #24424b;
        text-align: left;
        cursor: pointer;
      }

      .nav button.active,
      .nav button:hover {
        border-color: rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.42);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .main {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 18px;
      }

      .topbar {
        min-height: 86px;
        padding: 18px 20px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .eyebrow {
        margin: 0 0 5px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 30px;
      }

      h2 {
        margin-bottom: 0;
        font-size: 19px;
      }

      .pill {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
      }

      .workspace {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        min-height: 0;
        border-radius: 18px;
        padding: 18px;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      label span {
        display: block;
        margin-bottom: 7px;
        color: #31505a;
        font-size: 13px;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        height: 44px;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 12px;
        outline: none;
        background: rgba(255, 255, 255, 0.52);
        color: var(--ink);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      input:focus,
      select:focus {
        border-color: rgba(15, 118, 110, 0.54);
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
      }

      .primary,
      .secondary {
        height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 900;
      }

      .primary {
        border: 0;
        background: linear-gradient(135deg, #0f766e, #168b82);
        color: #fff;
        box-shadow: 0 14px 34px rgba(15, 118, 110, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      .secondary {
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: rgba(255, 255, 255, 0.46);
        color: var(--ink);
      }

      .list-panel {
        display: flex;
        flex-direction: column;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .metric {
        min-height: 76px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.48);
        border: 1px solid rgba(255, 255, 255, 0.68);
      }

      .metric span,
      .metric strong {
        display: block;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .metric strong {
        margin-top: 6px;
        font-size: 22px;
      }

      .items {
        min-height: 0;
        overflow-y: auto;
        display: grid;
        gap: 10px;
        padding-right: 4px;
      }

      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 82px;
        padding: 13px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.46);
        border: 1px solid rgba(255, 255, 255, 0.62);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
      }

      .item strong {
        display: block;
        margin-bottom: 4px;
      }

      .item small {
        color: var(--muted);
      }

      .item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .app {
          min-height: 100%;
          height: auto;
          grid-template-columns: 1fr;
        }

        .workspace,
        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="app">
      <aside class="sidebar glass">
        <div class="brand">
          <div class="brand-mark">MT</div>
          <div>
            <strong>MyTools</strong>
            <span>Liquid glass preview</span>
          </div>
        </div>
        <nav class="nav">
          <button class="active" type="button">Playwright</button>
          <button type="button">API Tester</button>
          <button type="button">Data Generator</button>
          <button type="button">Boundary Files</button>
          <button type="button">Utilities</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar glass">
          <div>
            <p class="eyebrow">Tool Manager</p>
            <h1>自动化脚本控制台</h1>
          </div>
          <span class="pill">Ready</span>
        </header>

        <section class="workspace">
          <section class="panel glass">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Recorder</p>
                <h2>录制新脚本</h2>
              </div>
              <span class="pill">Idle</span>
            </div>
            <form class="stack">
              <label>
                <span>脚本名称</span>
                <input autocomplete="off" value="login-demo">
              </label>
              <label>
                <span>起始网址</span>
                <input autocomplete="off" value="https://example.com/login">
              </label>
              <label>
                <span>运行模式</span>
                <select>
                  <option>有界面录制</option>
                  <option>后台回放</option>
                </select>
              </label>
              <button class="primary" type="button">开始录制</button>
            </form>
          </section>

          <section class="panel glass list-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Reports</p>
                <h2>运行看板</h2>
              </div>
              <button class="secondary" type="button">打开报告</button>
            </div>
            <div class="summary">
              <div class="metric">
                <span>脚本</span>
                <strong>12</strong>
              </div>
              <div class="metric">
                <span>通过</span>
                <strong>10</strong>
              </div>
              <div class="metric">
                <span>失败</span>
                <strong>2</strong>
              </div>
              <div class="metric">
                <span>Trace</span>
                <strong>8</strong>
              </div>
            </div>
            <div class="items">
              <article class="item">
                <div>
                  <strong>login</strong>
                  <small>06/08 09:42 · 18 actions · trace ready</small>
                </div>
                <div class="item-actions">
                  <button class="primary" type="button">回放</button>
                  <button class="secondary" type="button">增强定位</button>
                </div>
              </article>
              <article class="item">
                <div>
                  <strong>order-create</strong>
                  <small>06/08 09:36 · 27 actions · passed</small>
                </div>
                <div class="item-actions">
                  <button class="primary" type="button">回放</button>
                  <button class="secondary" type="button">Trace</button>
                </div>
              </article>
              <article class="item">
                <div>
                  <strong>boundary-upload</strong>
                  <small>06/08 09:28 · 15 actions · failed</small>
                </div>
                <div class="item-actions">
                  <button class="primary" type="button">回放</button>
                  <button class="secondary" type="button">报告</button>
                </div>
              </article>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
